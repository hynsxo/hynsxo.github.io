<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta property="og:title" content="이현서">
  <meta property="og:description" content="이현서의 포트폴리오입니다.">
  <meta property="og:image" content="https://hynsxo.github.io/profile-preview.png">
  <meta property="og:url" content="https://hynsxo.github.io/">
  <title>이현서</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown.min.css">
  
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #ffffff; /* 라이트 모드 기본 배경 */
    }

    .markdown-body {
      box-sizing: border-box;
      min-width: 200px;
      max-width: 980px;
      margin: 0 auto;
      padding: 45px;
    }

    @media (max-width: 767px) {
      .markdown-body {
        padding: 15px;
      }
    }

    @media (prefers-color-scheme: dark) {
      body {
        background-color: #0d1117;
      }
    }
  </style>
</head>
<body>

  <div id="content" class="markdown-body">로딩 중...</div>

  <script>
    fetch('README.md')
      .then(response => {
        if (!response.ok) {
          throw new Error('README.md 파일을 불러오지 못했습니다.');
        }
        return response.text();
      })
      .then(text => {
        document.getElementById('content').innerHTML = marked.parse(text);
      })
      .catch(err => {
        document.getElementById('content').innerHTML = `<p style="color: red;">오류 발생: ${err.message}</p>`;
      });
  </script>

</body>
</html>
